<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego del Número Secreto</title>
</head>
<body>

  <h2>¡¡¡¡¡¡ 😎😃🎉  🏆💥🥳Adivina el número (0 - 5)!!!!</h2>

  <button id="playBtn">Intentar</button>

  <br><br>

  <label>Resultado:</label>
  <input type="text" id="result" readonly>

  <script src="script.js"></script>

</body>
</html>
