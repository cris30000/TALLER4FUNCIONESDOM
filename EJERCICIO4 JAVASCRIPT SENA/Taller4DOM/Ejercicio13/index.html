<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Imagen con Cursor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }

<body>
    <h2>Pasa el cursor sobre la imagen</h2>
    <img id="miImagen" src="perro2.jpg" alt="Imagen Original">

</body>
</html>
