<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego del Número Secreto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h2>🎯 Adivina el número (0 - 5)</h2>

  <p id="attempts">Intentos restantes: 3</p>

  <input type="number" id="guess" min="0" max="5" placeholder="Escribe un número">

  <br><br>

  <button id="playBtn">Intentar</button>
  <button id="resetBtn">Reiniciar</button>

  <br><br>

  <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
