<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Web Programmer Job Application(Solicitud de empleo para prgramador web)</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; }
        label { display: block; margin-bottom: 8px; }
        button { margin-top: 10px; padding: 8px 15px; font-size: 16px; cursor: pointer; }
        #mensaje { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Web Programmer Job Application</h2>
<p>We need the following skillset(conjunto de habilidades). Which skills(habilidades) do you possess?</p>

<form id="formSkills">
    <label><input type="checkbox" name="skill" value="HTML5" checked> know HTML5</label>
    <label><input type="checkbox" name="skill" value="CSS" checked> know CSS</label>
    <label><input type="checkbox" name="skill" value="good coffee"> make good coffee</label>
    <button type="submit">Submit</button>
</form>

<div id="mensaje"></div>

<script src="script.js"></script>
</body>
</html>
