  <!-- Crea un programa que convierta temperaturas
entre las siguientes escalas:
● Celsius (°C)
● Fahrenheit (°F)
● Kelvin (K) -->
 

 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3: TEMPERATURAS </title>
</head>
<body>

    <h1>Conversor de Temperaturas </h1>

    <label>Valor:</label>
    <input type="number" id="valor" placeholder="Ej: 25">
<!--aqui defino las escalas-->
    <label>Escala:</label>
    <select id="escala">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <button id="convertir">Convertir</button>

    <h2 id="resultado"></h2>

    <script src="script.js"></script>

</body>
</html>
