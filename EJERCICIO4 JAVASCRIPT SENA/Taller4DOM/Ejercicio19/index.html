<!--- calculo de interes compuesto se valida:
el desposito inicial
la tasa de interes 
y el numero de años-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de interés compuesto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Cálculo de interés compuesto</h1>

    <form id="Formulario">
        <div class="form-group"><!-- para no usar br los uso en css -->
            <label for="deposit">Depósito inicial:</label>
            <input type="number" id="deposit" min="0" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="rate">Tasa de interés anual %:</label>
            <input type="number" id="rate" min="0" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="years">Número de años:</label>
            <input type="number" id="years" min="1" step="1" required>
        </div>
<!--BOTON PARA GENERAR EL INTERESff-->
        <button type="submit">Generar interés compuesto</button>
    </form>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
