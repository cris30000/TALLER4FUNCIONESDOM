<!-- ejercicio que pide nombre y apellido y genera
  el correo electronico por medio de un boton
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Ejercicio 11 - Generar Email</title>
</head>
<body>

    <p>Ingrese el nombre y apellido para generar su email.</p>

    <label for="firstName">Primer Nombre:</label>
    <input type="text" id="firstName" placeholder="Primer Nombre">

    <br>

    <label for="lastName">Apellido:</label>
    <input type="text" id="lastName" placeholder="Apellido">

    <br>

    <button id="generateBtn">Generar  Email</button>

    <p id="result"></p>

    <script src="script.js"></script>
</body>
</html>
