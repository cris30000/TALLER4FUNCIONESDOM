<!--Ejercicio 9
Crear un div cuadrado de 100x100px con un color
de fondo inicial.
Al mover el ratón sobre el div, el color de fondo
debe cambiar aleatoriamente.
Al hacer doble clic, el div debe volver al color
inicial.-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 9 cambiando el color</title>
    <style>
        #cuadrado {
            width: 100px;
            height: 100px;
            background-color: orange; /* color inicial */
        }
    </style>
</head>
<body>

    <div id="cuadrado"></div>

    <script src="script.js"></script>
</body>
</html>
